<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shop | Store</title>
    <!-- 基础样式重置 -->
    <link rel="stylesheet" href="../assets/css/normalize.css" />
    <!-- 页面主样式 -->
    <link rel="stylesheet" href="../assets/css/shop.css" />
    <!-- 在线字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- 页面头部 -->
    <div class="header">
      <div class="container">
        <a href="./shop.html" class="logo">商店</a>
        <div class="nav">
          <!-- 由脚本切换 show 类控制移动端导航 -->
          <ul class="nav-links" id="nav-links">
            <!-- 导航项 -->
            <li><a href="../index.html">返回首页</a></li>
            <li><a href="./about.html">关于我们</a></li>
            <li><a href="./contact.html">联系我们</a></li>
          </ul>
          <div class="icon" id="toggle">
            <i class="fa-solid fa-bars"></i>
          </div>
          <div class="cart" id="cart">
            <i class="fa-solid fa-bag-shopping"></i>
          </div>
        </div>
      </div>
    </div>
    <!-- 页面头部结束 -->

    <div class="product-search">
      <div class="container">
        <div class="search-panel">
          <div class="search-copy">
            <p class="search-tag">商品查询</p>
            <p class="search-tip">支持中文、英文、数字和符号搜索，输入完整商品名即可精准查询。</p>
          </div>
          <form class="search-form" id="product-search-form">
            <label class="search-label" for="product-name">商品名称</label>
            <div class="search-input-group">
              <input
                type="text"
                id="product-name"
                name="product-name"
                placeholder="请输入商品名，例如：游戏鼠标"
                autocomplete="off"
              />
              <button type="submit">查询商品</button>
            </div>
            <p class="search-feedback" id="search-feedback"></p>
          </form>
        </div>
      </div>
    </div>

    <!-- 商品展示区 -->
    <div class="features-products">
      <div class="container" id="products-container"></div>
    </div>
    <div class="order-feedback-wrap">
      <div class="container">
        <p class="order-feedback" id="order-feedback"></p>
      </div>
    </div>
    <!-- 商品展示区结束 -->

    <!-- 页面底部 -->
    <div class="footer">
      <div class="container">
        <div class="contact">
          <a href="./shop.html" class="logo">商店</a>
          <div class="info">
            <h4>联系我们</h4>
            <p><span>查看项目：<a href="https://github.com/FOUNDSJJ/Distributed-Software.git" target="_blank">仓库地址</a></span></p>
            <p><span>联系邮箱：</span>abc@example.com</p>
          </div>
          <div class="follow">
            <i class="fa-brands fa-facebook-f"></i>
            <i class="fa-brands fa-twitter"></i>
            <i class="fa-brands fa-instagram"></i>
            <i class="fa-brands fa-youtube"></i>
          </div>
        </div>

        <div class="box">
          <h4>相关</h4>
          <ul class="menu">
            <li><a href="">关于我们</a></li>
            <li><a href="">配送信息</a></li>
            <li><a href="">隐私政策</a></li>
            <li><a href="">条款和条件</a></li>
            <li><a href="">联系我们</a></li>
          </ul>
        </div>

        <div class="box">
          <h4>我的账户</h4>
          <ul>
            <li><a href="">登录</a></li>
            <li><a href="">查看购物车</a></li>
            <li><a href="">我的愿望清单</a></li>
            <li><a href="">跟踪我的订单</a></li>
            <li><a href="">帮助</a></li>
          </ul>
        </div>
      </div>
      <p class="dev">
        该项目由
        <a
          href="https://github.com/FOUNDSJJ"
          target="_blank"
          >FOUNDSJJ</a
        >
        创建
      </p>
    </div>
    <!-- 页面底部结束 -->

    <script src="./all.min.js"></script>
    <script src="./shop.js"></script>
    <script src="./order.js"></script>
    <script src="./pay.js"></script>
    <script src="./query.js"></script>
  </body>
</html>
