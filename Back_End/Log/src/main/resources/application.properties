# =========================
# MySQL Write DataSource
# =========================
spring.datasource.write.url=jdbc:mysql://${MYSQL_WRITE_HOST:mysql}:${MYSQL_WRITE_PORT:3306}/${MYSQL_DB:distributed_software}?serverTimezone=Asia/Shanghai&useSSL=false&useUnicode=true&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.write.username=${MYSQL_WRITE_USERNAME:root}
spring.datasource.write.password=${MYSQL_WRITE_PASSWORD:Password}
spring.datasource.write.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================
# MySQL Read DataSource
# =========================
spring.datasource.read.url=jdbc:mysql://${MYSQL_READ_HOST:${MYSQL_WRITE_HOST:mysql}}:${MYSQL_READ_PORT:${MYSQL_WRITE_PORT:3306}}/${MYSQL_DB:distributed_software}?serverTimezone=Asia/Shanghai&useSSL=false&useUnicode=true&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.read.username=${MYSQL_READ_USERNAME:${MYSQL_WRITE_USERNAME:root}}
spring.datasource.read.password=${MYSQL_READ_PASSWORD:${MYSQL_WRITE_PASSWORD:Password}}
spring.datasource.read.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================
# Redis
# =========================
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=3000ms

# =========================
# MyBatis
# =========================
mybatis.type-aliases-package=com.example.auth.model
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

# =========================
# Server
# =========================
server.port=9090
server.address=0.0.0.0

# =========================
# Logging
# =========================
logging.level.com.example.auth=info
logging.level.com.example.auth.config=debug
