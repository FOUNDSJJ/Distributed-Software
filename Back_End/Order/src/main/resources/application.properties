spring.application.name=order-service
spring.config.import=optional:nacos:${spring.application.name}.yaml

spring.cloud.nacos.server-addr=${NACOS_SERVER_ADDR:nacos:8848}
spring.cloud.nacos.discovery.server-addr=${spring.cloud.nacos.server-addr}
spring.cloud.nacos.config.server-addr=${spring.cloud.nacos.server-addr}
spring.cloud.nacos.config.file-extension=yaml
spring.cloud.nacos.config.group=DEFAULT_GROUP
spring.cloud.nacos.config.refresh-enabled=true

spring.datasource.write.url=jdbc:mysql://${MYSQL_WRITE_HOST:mysql-master}:${MYSQL_WRITE_PORT:3306}/${MYSQL_DB:distributed_software}?serverTimezone=Asia/Shanghai&useSSL=false&useUnicode=true&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.write.username=${MYSQL_WRITE_USERNAME:root}
spring.datasource.write.password=${MYSQL_WRITE_PASSWORD:Password}
spring.datasource.write.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.read.url=jdbc:mysql://${MYSQL_READ_HOST:${MYSQL_WRITE_HOST:mysql-master}}:${MYSQL_READ_PORT:${MYSQL_WRITE_PORT:3306}}/${MYSQL_DB:distributed_software}?serverTimezone=Asia/Shanghai&useSSL=false&useUnicode=true&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.read.username=${MYSQL_READ_USERNAME:${MYSQL_WRITE_USERNAME:root}}
spring.datasource.read.password=${MYSQL_READ_PASSWORD:${MYSQL_WRITE_PASSWORD:Password}}
spring.datasource.read.driver-class-name=com.mysql.cj.jdbc.Driver

spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=3000ms

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP:seckill-order-group}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.payment-simulator.group-id=${KAFKA_PAYMENT_SIMULATOR_GROUP:seckill-payment-simulator-group}

mybatis.type-aliases-package=com.example.order.model
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

server.port=9091
server.address=0.0.0.0

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

logging.level.com.example.order=info
logging.level.com.example.order.config=debug
