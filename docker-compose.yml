services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Password
      MYSQL_DATABASE: distributed_software
      TZ: Asia/Shanghai
    command:
      --default-authentication-plugin=mysql_native_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d

  redis:
    image: redis:7
    container_name: redis
    restart: always
    ports:
      - "6379:6379"

  backend1:
    build:
      context: ./Log
    container_name: backend1
    restart: always
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: distributed_software
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: Password
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - mysql
      - redis
    ports:
      - "8081:9090"

  backend2:
    build:
      context: ./Log
    container_name: backend2
    restart: always
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: distributed_software
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: Password
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - mysql
      - redis
    ports:
      - "8082:9090"

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    depends_on:
      - backend1
      - backend2
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./Front_End:/usr/share/nginx/html

volumes:
  mysql_data: