services:
  mysql-master:
    image: mysql:8.0
    container_name: mysql-master
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Password
      MYSQL_DATABASE: distributed_software
      TZ: Asia/Shanghai
    command:
      - --default-authentication-plugin=mysql_native_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_master_data:/var/lib/mysql
      - ./Database/MySQL_RW/master/my.cnf:/etc/mysql/conf.d/my.cnf
      - ./Database/MySQL_RW/master/init.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./Database/MySQL_RW/master/replication-user.sql:/docker-entrypoint-initdb.d/02-create-replication-user.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-pPassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  mysql-slave:
    image: mysql:8.0
    container_name: mysql-slave
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Password
      TZ: Asia/Shanghai
    command:
      - --default-authentication-plugin=mysql_native_password
    ports:
      - "3308:3306"
    volumes:
      - mysql_slave_data:/var/lib/mysql
      - ./Database/MySQL_RW/slave/my.cnf:/etc/mysql/conf.d/my.cnf
    depends_on:
      mysql-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-pPassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  mysql-replica-init:
    image: mysql:8.0
    container_name: mysql-replica-init
    restart: "no"
    depends_on:
      mysql-master:
        condition: service_healthy
      mysql-slave:
        condition: service_healthy
    volumes:
      - ./Database/MySQL_RW/slave/start-replication.sql:/docker-entrypoint-initdb.d/01-start-replication.sql
    entrypoint:
      - /bin/sh
      - -c
      - |
        mysql -hmysql-slave -uroot -pPassword < /docker-entrypoint-initdb.d/01-start-replication.sql

  redis:
    image: redis:7
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.7.1
    container_name: kafka
    restart: always
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

  backend1:
    build:
      context: ./Back_End/Log
      dockerfile: Dockerfile
    container_name: backend1
    restart: always
    environment:
      MYSQL_DB: distributed_software
      MYSQL_WRITE_HOST: mysql-master
      MYSQL_WRITE_PORT: 3306
      MYSQL_WRITE_USERNAME: root
      MYSQL_WRITE_PASSWORD: Password
      MYSQL_READ_HOST: mysql-slave
      MYSQL_READ_PORT: 3306
      MYSQL_READ_USERNAME: root
      MYSQL_READ_PASSWORD: Password
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      mysql-master:
        condition: service_healthy
      mysql-slave:
        condition: service_healthy
      mysql-replica-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      - "8081:9090"

  backend2:
    build:
      context: ./Back_End/Log
      dockerfile: Dockerfile
    container_name: backend2
    restart: always
    environment:
      MYSQL_DB: distributed_software
      MYSQL_WRITE_HOST: mysql-master
      MYSQL_WRITE_PORT: 3306
      MYSQL_WRITE_USERNAME: root
      MYSQL_WRITE_PASSWORD: Password
      MYSQL_READ_HOST: mysql-slave
      MYSQL_READ_PORT: 3306
      MYSQL_READ_USERNAME: root
      MYSQL_READ_PASSWORD: Password
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      mysql-master:
        condition: service_healthy
      mysql-slave:
        condition: service_healthy
      mysql-replica-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      - "8082:9090"

  backend-order:
    build:
      context: ./Back_End/Order
      dockerfile: Dockerfile
    container_name: backend-order
    restart: always
    environment:
      MYSQL_DB: distributed_software
      MYSQL_WRITE_HOST: mysql-master
      MYSQL_WRITE_PORT: 3306
      MYSQL_WRITE_USERNAME: root
      MYSQL_WRITE_PASSWORD: Password
      MYSQL_READ_HOST: mysql-slave
      MYSQL_READ_PORT: 3306
      MYSQL_READ_USERNAME: root
      MYSQL_READ_PASSWORD: Password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_CONSUMER_GROUP: seckill-order-group
    depends_on:
      mysql-master:
        condition: service_healthy
      mysql-slave:
        condition: service_healthy
      mysql-replica-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "8083:9091"

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    depends_on:
      - backend1
      - backend2
      - backend-order
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./Front_End:/usr/share/nginx/html

volumes:
  mysql_master_data:
  mysql_slave_data:
